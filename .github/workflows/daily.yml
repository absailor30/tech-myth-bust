# Save this as .github/workflows/daily.yml in your repo
name: Daily tech myth-bust scrape

on:
  schedule:
    # 13:30 UTC daily. Adjust to your local morning.
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write   # required to commit the CSV back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py

      - name: Commit CSV
        run: |
          git config user.name "tech-myth-bust-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "data: scrape $(date -u +%Y-%m-%d)"
            git push
          fi
